name: SSE Health Check

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"   # 4× daily: midnight, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:           # allow manual runs

jobs:
  # ─────────────────────────────────────────────
  # 1. Fan-out: one child job per URL
  # ─────────────────────────────────────────────
  matrix-setup:
    name: Build URL matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Define URLs
        id: set-matrix
        run: |
          MATRIX=$(cat <<'EOF'
          {
            "include": [
              { "name": "Vyla",            "url": "missourimonster-vyla.hf.space" },
              { "name": "Vyla-v2",         "url": "https://missourimonster-vyla-v2.hf.space" },
              { "name": "Movieslay",       "url": "https://missourimonster-movieslay.hf.space" },
              { "name": "StreamHub-v1",    "url": "https://StreamHubAPI-v1.hf.space" },
              { "name": "StreamHub-v2",    "url": "https://StreamHubAPI-v2.hf.space" },
              { "name": "D3R-v1",          "url": "https://d3rhub-v1.hf.space" },
              { "name": "D3R-v2",          "url": "https://d3rhub-v2.hf.space" },
              { "name": "Nuvio-v1",        "url": "https://NuvioHub-v1.hf.space" },
              { "name": "Nuvio-v2",        "url": "https://NuvioHub-v2.hf.space" }
            ]
          }
          echo "matrix=$(echo "$MATRIX" | jq -c .)" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────
  # 2. Child runner — one per URL
  # ─────────────────────────────────────────────
  probe:
    name: "Probe: ${{ matrix.name }}"
    needs: matrix-setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.matrix) }}

    steps:
      - name: Probe SSE endpoint
        id: probe
        env:
          TARGET_URL: ${{ matrix.url }}
          TARGET_NAME: ${{ matrix.name }}
        run: |
          # NOT using set -euo pipefail here — we handle errors explicitly
          # so that curl/grep/jq failures don't kill the step prematurely.

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          OUTFILE="${TARGET_NAME}-result.json"
          HEADER_FILE=$(mktemp)
          BODY_FILE=$(mktemp)
          EVENTS_FILE=$(mktemp)
          RAW_SSE_FILE=$(mktemp)

          echo "::group::Probing $TARGET_NAME → $TARGET_URL"

          # ── Curl the SSE endpoint ─────────────────────────────────────
          HTTP_STATUS=$(curl \
            --silent \
            --no-buffer \
            --max-time 20 \
            --connect-timeout 8 \
            --write-out "%{http_code}" \
            --output "$BODY_FILE" \
            --dump-header "$HEADER_FILE" \
            --header "Accept: text/event-stream" \
            --header "Cache-Control: no-cache" \
            --header "Connection: keep-alive" \
            --header "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
            --header "Accept-Language: en-US,en;q=0.9" \
            --header "Accept-Encoding: gzip, deflate, br" \
            --header "Sec-Fetch-Dest: empty" \
            --header "Sec-Fetch-Mode: cors" \
            --header "Sec-Fetch-Site: same-origin" \
            --header "DNT: 1" \
            --compressed \
            "$TARGET_URL" 2>/dev/null) || true

          # Fallback if curl returned nothing
          HTTP_STATUS="${HTTP_STATUS:-000}"

          # Cap raw body at 8 KB and store safely in a file (avoids all escaping issues)
          head -c 8192 "$BODY_FILE" > "$RAW_SSE_FILE" 2>/dev/null || true

          # ── Parse SSE lines — no pipelines, no subshells ──────────────
          # Build a JSON array by iterating line by line in pure bash.
          # Each SSE field+value is encoded via `jq -cn --arg` (always safe).
          echo "[" > "$EVENTS_FILE"
          FIRST_EVENT=true
          while IFS= read -r line || [[ -n "$line" ]]; do
            # Only process SSE field lines
            case "$line" in
              data:*|event:*|id:*|retry:*)
                field="${line%%:*}"
                value="${line#*: }"
                # jq --arg always produces valid JSON strings — no injection possible
                ENTRY=$(jq -cn --arg f "$field" --arg v "$value" '{field:$f,value:$v}' 2>/dev/null) || continue
                if [[ "$FIRST_EVENT" == "true" ]]; then
                  echo "$ENTRY" >> "$EVENTS_FILE"
                  FIRST_EVENT=false
                else
                  echo ",$ENTRY" >> "$EVENTS_FILE"
                fi
              ;;
            esac
          done < "$RAW_SSE_FILE"
          echo "]" >> "$EVENTS_FILE"

          # Validate the events array — reset to [] if malformed
          if ! jq -e . "$EVENTS_FILE" >/dev/null 2>&1; then
            echo "[]" > "$EVENTS_FILE"
          fi

          # ── Determine health ──────────────────────────────────────────
          HEALTH="error"
          ERROR_MSG=""
          case "$HTTP_STATUS" in
            2*)
              HEALTH="healthy"
              ;;
            000)
              HEALTH="unreachable"
              ERROR_MSG="curl could not connect (timeout or DNS failure)"
              ;;
            *)
              HEALTH="error"
              ERROR_MSG="HTTP $HTTP_STATUS"
              ;;
          esac

          echo "::endgroup::"

          # ── Step summary ──────────────────────────────────────────────
          EVENT_COUNT=$(jq 'length' "$EVENTS_FILE" 2>/dev/null || echo 0)

          if [[ "$HEALTH" == "healthy" ]]; then
            echo "### ✅ $TARGET_NAME — $HEALTH (HTTP $HTTP_STATUS)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ❌ $TARGET_NAME — $HEALTH" >> "$GITHUB_STEP_SUMMARY"
            echo "_${ERROR_MSG}_" >> "$GITHUB_STEP_SUMMARY"
          fi
          {
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| URL | \`$TARGET_URL\` |"
            echo "| HTTP status | $HTTP_STATUS |"
            echo "| Probed at | $TIMESTAMP |"
            echo "| SSE events received | $EVENT_COUNT |"
          } >> "$GITHUB_STEP_SUMMARY"

          # ── Write JSON artifact ───────────────────────────────────────
          # --rawfile reads from a file path — no shell escaping at all
          jq -n \
            --arg     name        "$TARGET_NAME" \
            --arg     url         "$TARGET_URL" \
            --arg     timestamp   "$TIMESTAMP" \
            --arg     http_status "$HTTP_STATUS" \
            --arg     health      "$HEALTH" \
            --arg     error       "$ERROR_MSG" \
            --rawfile raw_sse     "$RAW_SSE_FILE" \
            --slurpfile events    "$EVENTS_FILE" \
            '{
              name:        $name,
              url:         $url,
              probed_at:   $timestamp,
              http_status: $http_status,
              health:      $health,
              error:       (if $error == "" then null else $error end),
              sse: {
                raw_preview: ($raw_sse | .[0:2048]),
                events:      $events[0],
                event_count: ($events[0] | length)
              }
            }' > "$OUTFILE"

          echo "Artifact written → $OUTFILE"
          cat "$OUTFILE"

          rm -f "$HEADER_FILE" "$BODY_FILE" "$EVENTS_FILE" "$RAW_SSE_FILE"

          # Explicit exit code — no reliance on pipefail
          if [[ "$HEALTH" != "healthy" ]]; then
            echo "::error title=$TARGET_NAME::Probe failed — $HEALTH${ERROR_MSG:+ ($ERROR_MSG)}"
            exit 1
          fi

      - name: Upload SSE result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sse-result-${{ matrix.name }}
          path: "${{ matrix.name }}-result.json"
          retention-days: 1

  # ─────────────────────────────────────────────
  # 3. Aggregate — runs after all probes finish
  # ─────────────────────────────────────────────
  summarize:
    name: Aggregate results
    needs: probe
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sse-result-*
          merge-multiple: true
          path: results/

      - name: Merge into combined report
        run: |
          COMBINED=$(jq -sc '.' results/*.json)
          echo "$COMBINED" > combined-report.json

          TOTAL=$(echo "$COMBINED" | jq 'length')
          HEALTHY=$(echo "$COMBINED" | jq '[.[] | select(.health=="healthy")] | length')
          FAILED=$((TOTAL - HEALTHY))

          {
            echo "## 📊 SSE Health Check — Summary"
            echo ""
            echo "| | Count |"
            echo "|---|---|"
            echo "| ✅ Healthy | $HEALTHY |"
            echo "| ❌ Failed  | $FAILED  |"
            echo "| Total      | $TOTAL   |"
            echo ""
            echo "<details><summary>Full JSON report</summary>"
            echo ""
            echo '```json'
            cat combined-report.json
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined report
        uses: actions/upload-artifact@v4
        with:
          name: sse-combined-report
          path: combined-report.json
          retention-days: 1
